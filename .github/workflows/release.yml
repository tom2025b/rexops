name: Release

# Build, package, checksum, and publish release binaries when a version tag is
# pushed (e.g. `git tag v0.1.0 && git push origin v0.1.0`). Each target uploads
# a `.tar.gz` archive plus a matching `.sha256` so linux-ops-install can verify
# the download before installing it.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            cross: false
          - target: aarch64-unknown-linux-gnu
            cross: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --locked -p rexops-cli --target ${{ matrix.target }}

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --locked -p rexops-cli --target ${{ matrix.target }}

      - name: Package archive + checksum
        id: package
        run: |
          set -euo pipefail
          asset="rexops-${{ matrix.target }}"
          bindir="target/${{ matrix.target }}/release"
          test -f "$bindir/rexops" || { echo "missing binary: $bindir/rexops"; ls -la "$bindir"; exit 1; }
          install -m 0755 "$bindir/rexops" "rexops"
          tar -czf "$asset.tar.gz" "rexops"
          sha256sum "$asset.tar.gz" > "$asset.tar.gz.sha256"
          echo "archive=$asset.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=$asset.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}

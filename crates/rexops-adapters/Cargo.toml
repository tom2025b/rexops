[package]
name = "rexops-adapters"
version.workspace = true
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
description = "Adapter layer for RexOps — thin, replaceable integrations with Bulwark, ToolFoundry, ScriptVault, and system tools"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"

# NOTE: keep deps minimal. No tokio, no async, no anyhow in this phase.
# Execution is synchronous via std::process. Timeout implemented with std threads + channels.

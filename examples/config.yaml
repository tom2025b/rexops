# RexOps sample configuration (examples/config.yaml)
# This is the shape that AppConfig in rexops-core will deserialize.
#
# This file is a SAMPLE to copy — it is NOT loaded from examples/. Copy it to one
# of the search locations (first match wins):
#   1. $XDG_CONFIG_HOME/rexops/config.yaml  (or ~/.config/rexops/config.yaml)
#   2. /etc/rexops/config.yaml              (system-wide)
#   3. ./rexops.yaml or ./rexops.yml        (project-local override)
#   4. Built-in defaults                    (all adapters enabled) if none found
#
# RexOps prints which config it loaded to stderr on startup.

version: 1

# Adapter / tool configuration. The `adapters:` map is the single control
# surface for BOTH:
#   - probed adapters (data sources that produce health: bulwark, system, workstate)
#   - launchable tools in the Launcher catalog (bulwark, scriptvault, proto,
#     workstate, toolfoundry)
# Keys are tool/adapter ids. Everything here is OPTIONAL: each catalog tool has a
# built-in default binary equal to its id and is found on PATH, so no entry is
# required to launch it. Add an entry only to PIN a binary path or to DISABLE a
# tool (`enabled: false` blocks launch even if the binary is on PATH).
# Missing binaries or disabled adapters produce AdapterHealth::Unavailable and
# never cause hard failures in snapshots or the TUI.
adapters:
  bulwark:
    enabled: true
    # Binary name or absolute path. Default: "bulwark"
    binary: "bulwark"
    # Per-adapter timeout override (seconds). Default comes from adapter crate.
    # timeout_secs: 30

  # Launcher-only tools (no probe) are pinned/disabled under the same map.
  # Uncomment and set `binary:` only to override the PATH default.
  # scriptvault:
  #   enabled: true
  #   binary: "scriptvault"
  # proto:
  #   enabled: true
  #   binary: "proto"
  # workstate:
  #   enabled: true
  #   binary: "workstate"
  # toolfoundry:
  #   enabled: true
  #   binary: "toolfoundry"

  # system:
  #   enabled: true

# Global defaults
defaults:
  # Default timeout for adapter probes and data fetches (if not overridden)
  timeout_secs: 30
  # Whether to include detailed stderr in error reports / JSON output
  include_stderr_in_errors: true
